<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Osmora — Tomorrow Brand Group</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Archivo:wght@400;500;600;700;800;900&family=Manrope:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--ink:#211d18;--paper:#f4efe7;--paper-2:#ece4d8;--card:#fbf8f2;--line:#ddd3c4;--accent:#8a7355;--cream:#ecdcc4;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Manrope',sans-serif;background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;}
  a{color:inherit;text-decoration:none;}
  nav{display:flex;align-items:center;justify-content:space-between;padding:22px 40px;border-bottom:1px solid var(--line);background:var(--paper);position:sticky;top:0;z-index:10;}
  .nav-logo{font-family:'Archivo',sans-serif;font-weight:900;font-size:15px;letter-spacing:-.02em;text-transform:uppercase;line-height:.92;}
  .nav-logo span{color:var(--accent);}
  .back{font-family:'Archivo',sans-serif;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);display:flex;align-items:center;gap:8px;transition:opacity .25s;}
  .back:hover{opacity:.6;}
  .brand-hero{display:grid;grid-template-columns:340px 1fr;min-height:420px;}
  .brand-logo-panel{background:#fff;display:flex;align-items:center;justify-content:center;padding:60px;border-right:1px solid var(--line);}
  .brand-logo-panel img{max-width:240px;max-height:220px;object-fit:contain;}
  .brand-info{padding:60px;display:flex;flex-direction:column;justify-content:center;background:var(--card);}
  .brand-label{font-family:'Archivo',sans-serif;font-size:11px;letter-spacing:.26em;text-transform:uppercase;color:var(--accent);margin-bottom:14px;}
  .brand-name{font-family:'Playfair Display',serif;font-weight:400;font-size:clamp(2.2rem,4vw,3.2rem);line-height:1.05;margin-bottom:16px;}
  .brand-cat{font-size:.95rem;color:#4f4a42;font-weight:300;}
  .attr-section{padding:60px 40px;max-width:1200px;margin:0 auto;}
  .attr-label{font-family:'Archivo',sans-serif;font-size:11px;letter-spacing:.26em;text-transform:uppercase;color:var(--accent);margin-bottom:24px;}
  .attr-image{width:100%;border-radius:8px;border:1px solid var(--line);display:block;}
  footer{border-top:1px solid var(--line);padding:28px 40px;display:flex;justify-content:space-between;align-items:center;font-size:.82rem;color:#8a867d;margin-top:40px;}
  .fl{font-family:'Archivo',sans-serif;font-weight:900;font-size:13px;text-transform:uppercase;color:var(--ink);}
  .fl span{color:var(--accent);}
  @media(max-width:820px){.brand-hero{grid-template-columns:1fr;}.brand-logo-panel{border-right:none;border-bottom:1px solid var(--line);padding:40px;}.brand-info{padding:40px;}}
</style>
</head>
<body>
<nav>
  <div class="nav-logo">Tomorrow Brand<span>.</span>Group</div>
  <a href="../index.html" class="back">← All Brands</a>
</nav>
<div class="brand-hero">
  <div class="brand-logo-panel">
    <img src="../images/osmora.png" alt="Osmora">
  </div>
  <div class="brand-info">
    <div class="brand-label">In-House Brand</div>
    <div class="brand-name">Osmora</div>
    <div class="brand-cat">Skin Care</div>
  </div>
</div>
<div class="attr-section">
  <div class="attr-label">Brand Attributes and Design Direction</div>
  <img src="../images/brands/brandosmora.png" alt="Osmora brand attributes" class="attr-image">
</div>
<footer>
  <div class="fl">Tomorrow Brand<span>.</span>Group</div>
  <div>2026 Tomorrow Brand Group</div>
</footer>
</body>
</html>
