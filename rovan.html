<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rovan — Crafted for Confidence</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0a;
    --dark: #111111;
    --card: #161616;
    --border: #2a2a2a;
    --gunmetal: #2c2f33;
    --silver: #8a8f96;
    --light-silver: #c8cdd4;
    --white: #f0f0f0;
    --accent: #c0a060;
    --accent-dim: #8a7040;
    --red: #cc4444;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Montserrat', sans-serif;
    min-height: 100vh;
  }

  /* NAV */
  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,10,10,0.97);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 48px;
    height: 64px;
    backdrop-filter: blur(8px);
  }

  .nav-left {
    display: flex;
    align-items: center;
    gap: 32px;
  }

  .back-link {
    color: var(--silver);
    text-decoration: none;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    transition: color 0.2s;
  }
  .back-link:hover { color: var(--white); }

  .nav-brand {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 0.08em;
    color: var(--white);
  }
  .nav-brand span { color: var(--accent); }

  .nav-tagline {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--silver);
  }

  .nav-actions {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .selected-count {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: var(--silver);
  }
  .selected-count span { color: var(--accent); }

  .btn-pdf {
    background: var(--accent);
    color: var(--black);
    border: none;
    padding: 10px 24px;
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-pdf:hover { background: var(--accent-dim); color: var(--white); }
  .btn-pdf:disabled { background: var(--gunmetal); color: var(--silver); cursor: not-allowed; }

  /* HERO STRIP */
  .hero-strip {
    background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 50%, #0f0f0f 100%);
    border-bottom: 1px solid var(--border);
    padding: 48px 48px 40px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }

  .hero-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 72px;
    letter-spacing: 0.06em;
    line-height: 1;
    color: var(--white);
  }
  .hero-title span { color: var(--accent); }

  .hero-sub {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--silver);
    margin-top: 8px;
  }

  .hero-stat {
    text-align: right;
  }
  .hero-stat .num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px;
    color: var(--accent);
    line-height: 1;
  }
  .hero-stat .label {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--silver);
  }

  /* TABS */
  .tabs-bar {
    background: var(--dark);
    border-bottom: 1px solid var(--border);
    padding: 0 48px;
    display: flex;
    gap: 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs-bar::-webkit-scrollbar { display: none; }

  .tab {
    padding: 16px 24px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--silver);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: all 0.2s;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
    font-family: 'Montserrat', sans-serif;
  }
  .tab:hover { color: var(--white); }
  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* GRID */
  .store-body {
    padding: 40px 48px 80px;
  }

  .product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 2px;
  }

  /* PRODUCT CARD */
  .product-card {
    background: var(--card);
    border: 1px solid var(--border);
    position: relative;
    transition: border-color 0.2s;
    cursor: pointer;
  }
  .product-card:hover { border-color: var(--silver); }
  .product-card.checked { border-color: var(--accent); }

  .card-checkbox {
    position: absolute;
    top: 14px;
    left: 14px;
    z-index: 2;
    width: 20px;
    height: 20px;
    accent-color: var(--accent);
    cursor: pointer;
  }

  .card-image-wrap {
    width: 100%;
    aspect-ratio: 1;
    overflow: hidden;
    background: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .card-image-wrap img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    padding: 20px;
    transition: transform 0.3s;
  }
  .product-card:hover .card-image-wrap img { transform: scale(1.04); }

  .card-image-placeholder {
    width: 80px;
    height: 80px;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--gunmetal);
    font-size: 28px;
  }

  .card-info {
    padding: 16px 18px 20px;
    border-top: 1px solid var(--border);
  }

  .card-category {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent-dim);
    margin-bottom: 6px;
  }

  .card-name {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--white);
    margin-bottom: 12px;
    line-height: 1.3;
  }

  .card-pricing {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .card-msrp {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--white);
    letter-spacing: 0.04em;
  }

  .card-msrp-label {
    font-size: 9px;
    color: var(--silver);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  .card-view {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    text-decoration: none;
    transition: color 0.2s;
  }
  .card-view:hover { color: var(--white); }

  /* BRAND ATTRIBUTES TAB */
  .brand-attr-panel {
    display: none;
    padding: 0;
  }
  .brand-attr-panel.active { display: block; }
  .brand-attr-panel img {
    width: 100%;
    display: block;
  }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--silver);
  }
  .empty-state .icon { font-size: 40px; margin-bottom: 16px; }
  .empty-state p { font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; }

  /* PDF OVERLAY */
  .pdf-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .pdf-overlay.active { display: flex; }
  .pdf-modal {
    background: var(--dark);
    border: 1px solid var(--border);
    padding: 48px;
    max-width: 480px;
    width: 100%;
    text-align: center;
  }
  .pdf-modal h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }
  .pdf-modal p {
    font-size: 12px;
    color: var(--silver);
    letter-spacing: 0.06em;
    margin-bottom: 32px;
  }
  .pdf-modal .btn-pdf { width: 100%; padding: 14px; font-size: 12px; }
  .btn-cancel {
    display: block;
    margin-top: 16px;
    background: none;
    border: 1px solid var(--border);
    color: var(--silver);
    padding: 10px 24px;
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    width: 100%;
    transition: all 0.2s;
  }
  .btn-cancel:hover { border-color: var(--silver); color: var(--white); }

  @media (max-width: 768px) {
    nav { padding: 0 20px; }
    .hero-strip { padding: 32px 20px; }
    .hero-title { font-size: 48px; }
    .store-body { padding: 24px 20px 60px; }
    .tabs-bar { padding: 0 20px; }
    .product-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
  }
</style>
</head>
<body>

<nav>
  <div class="nav-left">

  <button class="tab" data-tab="pre-shave" onclick="switchTab('pre-shave', this)">Pre-Shave</button>
  <button class="tab" data-tab="body-care" onclick="switchTab('body-care', this)">Body Care</button>
  <button class="tab" data-tab="gift-sets" onclick="switchTab('gift-sets', this)">Gift Sets</button>
  <button class="tab" data-tab="brand-attributes" onclick="switchTab('brand-attributes', this)">Brand Attributes</button>

<div class="store-body">

  <div class="brand-attr-panel" id="brandAttrPanel">

</div>

<div class="pdf-overlay" id="pdfOverlay">
  <div class="pdf-modal">
    <h2>Generate Catalog</h2>
    <p id="pdfModalDesc">Generating landscape PDF for selected SKUs</p>
    <button class="btn-pdf" onclick="generatePDF()">Download PDF Catalog</button>
    <button class="btn-cancel" onclick="closePdfModal()">Cancel</button>
  </div>
</div>

  { id: 'complete-care-pack', name: 'Complete Care Pack', category: 'gift-sets', categoryLabel: 'Gift Sets', msrp: 29.99, image: 'images/rovan/complete-care-pack.png', slug: 'complete-care-pack' },
];

let currentTab = 'all';
let checked = new Set();

function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');

  const grid = document.getElementById('productGrid');
  const attr = document.getElementById('brandAttrPanel');

  if (tab === 'brand-attributes') {
    grid.style.display = 'none';
    attr.classList.add('active');
  } else {
    grid.style.display = 'grid';
    attr.classList.remove('active');
    renderGrid(tab);
  }
}

function renderGrid(tab) {
  const grid = document.getElementById('productGrid');
  const filtered = tab === 'all' ? PRODUCTS : PRODUCTS.filter(p => p.category === tab);

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="icon">◻</div><p>No products in this category yet</p></div>`;
    return;
  }

  grid.innerHTML = filtered.map(p => `
    <div class="product-card ${checked.has(p.id) ? 'checked' : ''}" id="card-${p.id}">
      <input type="checkbox" class="card-checkbox" ${checked.has(p.id) ? 'checked' : ''}
        onclick="toggleCheck(event, '${p.id}')">
      <div class="card-image-wrap" onclick="goToDetail('${p.slug}')">
        <img src="${p.image}" alt="${p.name}"
          onerror="this.style.display='none';this.parentNode.innerHTML='<div class=\'card-image-placeholder\'>◻</div>'">
      </div>
      <div class="card-info">
        <div class="card-category">${p.categoryLabel}</div>
        <div class="card-name">${p.name}</div>
        <div class="card-pricing">
          <div>
            <div class="card-msrp-label">MSRP</div>
            <div class="card-msrp">$${p.msrp.toFixed(2)}</div>
          </div>
          <a class="card-view" href="rovan-product.html?sku=${p.slug}">View Details →</a>
        </div>
      </div>
    </div>
  `).join('');

  document.getElementById('skuCount').textContent = PRODUCTS.length;
}

function toggleCheck(e, id) {
  e.stopPropagation();
  if (checked.has(id)) {
    checked.delete(id);
    document.getElementById('card-' + id)?.classList.remove('checked');
  } else {
    checked.add(id);
    document.getElementById('card-' + id)?.classList.add('checked');
  }
  updateCount();
}

function updateCount() {
  const n = checked.size;
  document.getElementById('selectedNum').textContent = n;
  const btn = document.getElementById('pdfBtn');
  btn.disabled = n === 0;
}

function goToDetail(slug) {
  window.location.href = `rovan-product.html?sku=${slug}`;
}

function openPdfModal() {
  const n = checked.size;
  document.getElementById('pdfModalDesc').textContent = `${n} SKU${n !== 1 ? 's' : ''} selected for your Rovan catalog`;
  document.getElementById('pdfOverlay').classList.add('active');
}

function closePdfModal() {
  document.getElementById('pdfOverlay').classList.remove('active');
}

async function generatePDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
  const W = 297, H = 210;

  // Cover page
  doc.setFillColor(10, 10, 10);
  doc.rect(0, 0, W, H, 'F');
  doc.setTextColor(192, 160, 96);
  doc.setFontSize(64);
  doc.setFont('helvetica', 'bold');
  doc.text('ROVAN', W/2, H/2 - 10, { align: 'center' });
  doc.setFontSize(12);
  doc.setTextColor(138, 143, 150);
  doc.text('CRAFTED FOR CONFIDENCE', W/2, H/2 + 10, { align: 'center' });
  doc.setFontSize(9);
  doc.text('PRODUCT CATALOG', W/2, H/2 + 22, { align: 'center' });

  const selectedProducts = PRODUCTS.filter(p => checked.has(p.id));

  for (const product of selectedProducts) {
    doc.addPage();
    doc.setFillColor(10, 10, 10);
    doc.rect(0, 0, W, H, 'F');

    // Left panel background
    doc.setFillColor(22, 22, 22);
    doc.rect(0, 0, 110, H, 'F');

    // Category label
    doc.setFontSize(8);
    doc.setTextColor(138, 112, 64);
    doc.setFont('helvetica', 'bold');
    doc.text(product.categoryLabel.toUpperCase(), 125, 30);

    // Product name
    doc.setFontSize(28);
    doc.setTextColor(240, 240, 240);
    doc.setFont('helvetica', 'bold');
    doc.text(product.name.toUpperCase(), 125, 48);

    // Divider
    doc.setDrawColor(192, 160, 96);
    doc.setLineWidth(0.5);
    doc.line(125, 54, 280, 54);

    // MSRP
    doc.setFontSize(10);
    doc.setTextColor(138, 143, 150);
    doc.setFont('helvetica', 'normal');
    doc.text('MSRP', 125, 68);
    doc.setFontSize(22);
    doc.setTextColor(192, 160, 96);
    doc.setFont('helvetica', 'bold');
    doc.text(`$${product.msrp.toFixed(2)}`, 125, 80);

    // Specs placeholder
    doc.setFontSize(9);
    doc.setTextColor(138, 143, 150);
    doc.setFont('helvetica', 'normal');
    const specs = getSpecs(product);
    let y = 100;
    specs.forEach(s => {
      doc.setTextColor(192, 160, 96);
      doc.text(s.label + ':', 125, y);
      doc.setTextColor(200, 205, 212);
      doc.text(s.value, 175, y);
      y += 10;
    });

    // Branding bottom
    doc.setFontSize(8);
    doc.setTextColor(50, 50, 50);
    doc.text('ROVAN  ·  A BETTER SHAVE. EVERY DAY.', W/2, H - 8, { align: 'center' });
  }

  doc.save('Rovan-Product-Catalog.pdf');
  closePdfModal();
}

function getSpecs(product) {
  const cat = product.category;
  if (cat === 'hero-razors') return [
    { label: 'Blade Count', value: product.name.includes('5') ? '5 Blades' : product.name.includes('3') ? '3 Blades' : '5 Blades' },
    { label: 'Handle', value: 'Precision-grip Rubberized' },
    { label: 'Lubrastrip', value: 'Vitamin E + Aloe' },
    { label: 'Compatibility', value: 'Rovan Universal Cartridges' },
    { label: 'UPC', value: 'Assign on export' },
  ];
  if (cat === 'cartridge-refills') return [
    { label: 'Count', value: product.name },
    { label: 'Blade Type', value: 'Stainless Steel, 5-Layer' },
    { label: 'Coating', value: 'PTFE + Vitamin E' },
    { label: 'Compatibility', value: 'All Rovan Handles' },
  ];
  if (cat === 'shave-gels' || cat === 'shave-creams') return [
    { label: 'Volume', value: '7 fl oz (207 mL)' },
    { label: 'Skin Type', value: product.name.includes('Sensitive') ? 'Sensitive' : 'All Skin Types' },
    { label: 'Key Ingredients', value: 'Aloe Vera, Glycerin' },
    { label: 'Alcohol-Free', value: 'Yes' },
  ];
  if (cat === 'after-shave') return [
    { label: 'Volume', value: '5 fl oz (148 mL)' },
    { label: 'Formula', value: 'Soothing + Hydrating' },
    { label: 'Key Ingredients', value: 'Witch Hazel, Panthenol' },
    { label: 'Alcohol-Free', value: 'Yes' },
  ];
  if (cat === 'gift-sets') return [
    { label: 'Set Contents', value: 'See packaging' },
    { label: 'Packaging', value: 'Premium Gift Box' },
    { label: 'Retail Ready', value: 'Yes' },
    { label: 'Min Order', value: 'Contact Sales' },
  ];
  return [
    { label: 'Volume / Count', value: 'See packaging' },
    { label: 'Formula', value: 'Premium Grade' },
    { label: 'For', value: 'All Skin Types' },
  ];
}

// Init
renderGrid('all');
</script>
