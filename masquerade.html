<style>
  :root {
    --black: #0a0a0a;
    --charcoal: #1a1a1a;
    --graphite: #2a2a2a;
    --border: #2e2e2e;
    --rose-gold: #C8956C;
    --rose-gold-light: #e8b89a;
    --soft-pink: #FF91C1;
    --white: #ffffff;
    --off-white: #f5f0eb;
    --silver: #888;
    --card-bg: #141414;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }

  /* NAV */
  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 48px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: rgba(10,10,10,0.96);
    backdrop-filter: blur(12px);
    z-index: 100;
  }
  .nav-left { display: flex; align-items: center; gap: 32px; }
  .back-link {
    color: var(--silver);
    text-decoration: none;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    transition: color 0.2s;
  }
  .back-link:hover { color: var(--rose-gold); }
  .nav-brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 300;
    letter-spacing: 0.22em;
    text-transform: uppercase;
  }
  .nav-brand span { color: var(--rose-gold); }
  .nav-right { display: flex; align-items: center; gap: 24px; }
  .pdf-btn {
    background: var(--rose-gold);
    color: var(--black);
    border: none;
    padding: 10px 24px;
    font-family: 'Montserrat', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  .pdf-btn:hover { background: var(--rose-gold-light); transform: translateY(-1px); }
  .selected-count {
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--silver);
    text-transform: uppercase;
  }
  .selected-count span { color: var(--rose-gold); font-weight: 500; }

  /* TABS */
  .tabs-wrap {
    border-bottom: 1px solid var(--border);
    padding: 0 48px;
    overflow-x: auto;
    scrollbar-width: none;
    background: var(--charcoal);
  }
  .tabs-wrap::-webkit-scrollbar { display: none; }
  .tabs {
    display: flex;
    gap: 0;
    white-space: nowrap;
  }
  .tab {
    padding: 16px 24px;
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    font-weight: 500;
    color: var(--silver);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color 0.2s, border-color 0.2s;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
    font-family: 'Montserrat', sans-serif;
  }
  .tab:hover { color: var(--white); }
  .tab.active { color: var(--rose-gold); border-bottom-color: var(--rose-gold); }

  /* GRID */
  .grid-section { padding: 40px 48px 80px; }
  .grid-header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 32px;
  }
  .grid-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 300;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .grid-count {
    font-size: 10px;
    color: var(--silver);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 2px;
  }

  .product-card {
    background: var(--card-bg);
    position: relative;
    transition: transform 0.2s;
  }
  .product-card:hover { transform: translateY(-3px); }

  .card-checkbox {
    position: absolute;
    top: 12px;
    left: 12px;
    z-index: 2;
  }
  .card-checkbox input {
    width: 16px;
    height: 16px;
    accent-color: var(--rose-gold);
    cursor: pointer;
  }

  .card-img-wrap {
    height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    cursor: pointer;
    background: #111;
    overflow: hidden;
  }
  .card-img-wrap img {
    max-height: 160px;
    max-width: 100%;
    object-fit: contain;
    transition: transform 0.3s;
  }
  .card-img-wrap:hover img { transform: scale(1.05); }

  .card-info {
    padding: 16px;
    border-top: 1px solid var(--border);
  }
  .card-name {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 500;
    margin-bottom: 4px;
    color: var(--white);
    line-height: 1.4;
  }
  .card-tagline {
    font-size: 10px;
    color: var(--silver);
    margin-bottom: 10px;
    font-style: italic;
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
  }
  .card-prices {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .card-msrp {
    font-size: 13px;
    color: var(--rose-gold);
    font-weight: 500;
    letter-spacing: 0.04em;
  }
  .card-wholesale {
    font-size: 10px;
    color: var(--silver);
    letter-spacing: 0.06em;
  }

  /* BRAND ATTRIBUTES TAB */
  .brand-attr-section {
    padding: 0;
    display: none;
  }
  .brand-attr-section.active { display: block; }
  .brand-attr-section img {
    width: 100%;
    display: block;
  }

  /* HIDDEN STATE */
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* FOOTER */
  footer {
    border-top: 1px solid var(--border);
    padding: 24px 48px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .footer-brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    font-weight: 300;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
  .footer-brand span { color: var(--rose-gold); }
  .footer-tagline {
    font-size: 9px;
    color: var(--silver);
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }
</style>
</head>

const selected = new Set();

function wholesale(msrp) { return (msrp * 0.5).toFixed(2); }

function buildCard(p) {
  const div = document.createElement('div');
  div.className = 'product-card';
  div.innerHTML = `
    <div class="card-checkbox">
      <input type="checkbox" id="chk_${p.id}" onchange="toggleSelect('${p.id}', this.checked)">
    </div>
    <div class="card-img-wrap" onclick="window.location='masquerade-product.html?sku=${p.id}'">
      <img src="images/masquerade/${p.id}.png" alt="${p.name}"
           onerror="this.style.opacity='0.2'; this.src='data:image/svg+xml,<svg xmlns=\\'http://www.w3.org/2000/svg\\' width=\\'80\\' height=\\'80\\'><rect fill=\\'%23333\\' width=\\'80\\' height=\\'80\\'></rect></svg>'">
    </div>
    <div class="card-info">
      <div class="card-name">${p.name}</div>
      <div class="card-tagline">${p.tagline}</div>
      <div class="card-prices">
        <div class="card-msrp">$${p.msrp.toFixed(2)}</div>
        <div class="card-wholesale">WS $${wholesale(p.msrp)}</div>
      </div>
    </div>
  `;
  return div;
}

function renderGrids() {
  const cats = ['all','face','eye','lip','skincare','brushes','sets','accessories'];
  cats.forEach(cat => {
    const grid = document.getElementById(`grid-${cat}`);
    const count = document.getElementById(`count-${cat}`);
    if (!grid) return;
    const products = PRODUCTS.filter(p => p.cat.includes(cat));
    grid.innerHTML = '';
    products.forEach(p => grid.appendChild(buildCard(p)));
    if (count) count.textContent = `${products.length} Products`;
  });
}

function toggleSelect(id, checked) {
  // sync all checkboxes with same id
  document.querySelectorAll(`[id="chk_${id}"]`).forEach(el => el.checked = checked);
  if (checked) selected.add(id); else selected.delete(id);
  document.getElementById('selCount').textContent = selected.size;
}

function showTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById(`panel-${tab}`).classList.add('active');
}

function generatePDF() {
  if (selected.size === 0) { alert('Select at least one product first.'); return; }
  const skus = [...selected].join(',');
  window.open(`masquerade-catalog-pdf.html?skus=${skus}`, '_blank');
}

renderGrids();
</script>
