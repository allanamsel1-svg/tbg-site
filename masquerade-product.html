<html lang="en">
<head>
<meta charset="UTF-8">

<title>Masquerade NYC — Product</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0a;
    --charcoal: #1a1a1a;
    --graphite: #2a2a2a;
    --border: #2e2e2e;
    --rose-gold: #C8956C;
    --rose-gold-light: #e8b89a;
    --white: #ffffff;
    --off-white: #f5f0eb;
    --silver: #888;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--black); color: var(--white); font-family: 'Montserrat', sans-serif; font-weight: 300; }

  nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 48px; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: rgba(10,10,10,0.96);
    backdrop-filter: blur(12px); z-index: 100;
  }
  .nav-left { display: flex; align-items: center; gap: 32px; }
  .back-link { color: var(--silver); text-decoration: none; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; transition: color 0.2s; }
  .back-link:hover { color: var(--rose-gold); }
  .nav-brand { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 300; letter-spacing: 0.22em; text-transform: uppercase; }
  .nav-brand span { color: var(--rose-gold); }

  .product-wrap {
    display: grid;
    grid-template-columns: 1fr 1fr;
    min-height: calc(100vh - 65px);
  }

  /* LEFT — image */
  .product-visual {
    background: #0e0e0e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px;
    border-right: 1px solid var(--border);
    position: sticky;
    top: 65px;
    height: calc(100vh - 65px);
  }
  .product-hero-img {
    max-height: 420px;
    max-width: 100%;
    object-fit: contain;
    display: block;
  }
  .thumb-strip {
    display: flex;
    gap: 12px;
    margin-top: 32px;
  }
  .thumb {
    width: 60px;
    height: 60px;
    background: var(--charcoal);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    opacity: 0.5;
    transition: opacity 0.2s, border-color 0.2s;
    font-size: 9px;
    letter-spacing: 0.08em;
    color: var(--silver);
    text-align: center;
    padding: 4px;
  }
  .thumb.active { opacity: 1; border-color: var(--rose-gold); }

  /* RIGHT — info */
  .product-info { padding: 60px 56px; overflow-y: auto; }

  .product-category {
    font-size: 9px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--rose-gold);
    margin-bottom: 16px;
  }
  .product-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 44px;
    font-weight: 300;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    line-height: 1.1;
    margin-bottom: 12px;
  }
  .product-tagline {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-style: italic;
    color: var(--silver);
    margin-bottom: 32px;
  }

  .divider { height: 1px; background: var(--border); margin: 28px 0; }

  .price-row { display: flex; gap: 40px; margin-bottom: 32px; }
  .price-block {}
  .price-label { font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--silver); margin-bottom: 6px; }
  .price-value { font-size: 28px; color: var(--rose-gold); font-weight: 300; letter-spacing: 0.04em; }
  .price-value.ws { font-size: 22px; color: var(--white); }

  .section-label {
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--rose-gold);
    margin-bottom: 16px;
  }
  .spec-table { width: 100%; border-collapse: collapse; margin-bottom: 8px; }
  .spec-table tr { border-bottom: 1px solid var(--border); }
  .spec-table tr:last-child { border-bottom: none; }
  .spec-table td { padding: 10px 0; font-size: 12px; letter-spacing: 0.04em; }
  .spec-table td:first-child { color: var(--silver); width: 45%; }
  .spec-table td:last-child { color: var(--white); }

  .cert-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; }
  .cert-chip {
    border: 1px solid var(--rose-gold);
    color: var(--rose-gold);
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 5px 12px;
  }

  .assets-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 8px;
  }
  .asset-box {
    background: var(--charcoal);
    border: 1px solid var(--border);
    height: 100px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .asset-box:hover { border-color: var(--rose-gold); }
  .asset-icon { font-size: 20px; }
  .asset-label { font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--silver); }

  .brand-link {
    display: inline-block;
    margin-top: 32px;
    color: var(--silver);
    text-decoration: none;
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    padding-bottom: 3px;
    transition: color 0.2s, border-color 0.2s;
  }
  .brand-link:hover { color: var(--rose-gold); border-color: var(--rose-gold); }
</style>
</head>

  headband:               { name:'Headband',                 category:'Accessories',     tagline:'Comfortable, keeps hair back',        msrp:14, specs:{'Material':'Soft terry','One Size':'Yes'}, certs:['Vegan'] },
  powder_refill:          { name:'Powder Refill',            category:'Refills',         tagline:'Refill & save, eco friendly',         msrp:22, specs:{'Type':'Refill Pan','Sustainability':'Refillable packaging'}, certs:['Recyclable','Clean Beauty'] },
  counter_display:        { name:'Counter Display',          category:'Display Units',   tagline:'Perfect for retail, attractive display',msrp:180,specs:{'Type':'Countertop Display','Capacity':'Full line','Material':'Acrylic + Metal'}, certs:['Made in USA'] },
  professional_palettes:  { name:'Professional Palettes',    category:'Professional',    tagline:'Designed for pros, high pigment',     msrp:110,specs:{'Shades':'Multiple','Grade':'Professional','Pigment':'High-performance'}, certs:['Cruelty Free','Paraben Free'] },
};

const sku = new URLSearchParams(window.location.search).get('sku') || 'matte_foundation';
const p = PRODUCTS[sku] || PRODUCTS['matte_foundation'];

document.getElementById('heroImg').src = `images/masquerade/${sku}.png`;
document.getElementById('heroImg').alt = p.name;
document.getElementById('prodCategory').textContent = p.category;
document.getElementById('prodName').textContent = p.name;
document.getElementById('prodTagline').textContent = p.tagline;
document.getElementById('prodMSRP').textContent = `$${p.msrp.toFixed(2)}`;
document.getElementById('prodWS').textContent = `$${(p.msrp * 0.5).toFixed(2)}`;
document.title = `Masquerade NYC — ${p.name}`;

const specTable = document.getElementById('specTable');
Object.entries(p.specs).forEach(([k, v]) => {
  const tr = document.createElement('tr');
  tr.innerHTML = `<td>${k}</td><td>${v}</td>`;
  specTable.appendChild(tr);
});

const certChips = document.getElementById('certChips');
p.certs.forEach(c => {
  const span = document.createElement('span');
  span.className = 'cert-chip';
  span.textContent = c;
  certChips.appendChild(span);
});

function setThumb(i) {
  document.querySelectorAll('.thumb').forEach((t, idx) => t.classList.toggle('active', idx === i));
}
</script>
